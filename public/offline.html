<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЭлектроСмета — Нет подключения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f5f5f5; color: #333;
    }
    .container {
      text-align: center; padding: 2rem; max-width: 400px;
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border-radius: 50%; background: #8b5cf6;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; fill: white; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #1a1a1a; }
    p { font-size: 1rem; color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem;
      background: #8b5cf6; color: white; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
    }
    .btn:active { transform: scale(0.95); }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
      h1 { color: #f0f0f0; }
      p { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4c-1.48 0-2.85.43-4.01 1.17l1.46 1.46C10.21 6.23 11.08 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3 0 1.13-.64 2.11-1.56 2.62l1.45 1.45C23.16 18.16 24 16.68 24 15c0-2.64-2.05-4.78-4.65-4.96zM3 5.27l2.75 2.74C2.56 8.15 0 10.77 0 14c0 3.31 2.69 6 6 6h11.73l2 2 1.27-1.27L4.27 4 3 5.27zM7.73 10l8 8H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h1.73z"/>
      </svg>
    </div>
    <h1>Нет подключения к интернету</h1>
    <p>ЭлектроСмета работает офлайн, но для первого запуска необходимо подключение к интернету. Проверьте соединение и попробуйте снова.</p>
    <button class="btn" onclick="window.location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
